<!DOCTYPE html>
<html lang="ar" dir="rtl" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>دفتر الإنجاز</title>
    <meta name="description" content="تطبيق دفتر الإنجاز - مفكرة ذكية لإدارة الملاحظات والمهام والروابط والعمل">
    <meta name="theme-color" content="#2563EB">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="دفتر الإنجاز">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g'><stop offset='0%' stop-color='%233B82F6'/><stop offset='100%' stop-color='%231D4ED8'/></linearGradient></defs><rect width='100' height='100' rx='22' fill='url(#g)'/><text x='50' y='65' text-anchor='middle' fill='white' font-size='50' font-family='Arial'>📒</text></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#2563EB', 
                        primaryDark: '#1D4ED8', 
                        primaryLight: '#3B82F6',
                        accent: '#93C5FD',
                        surface: '#F0F4FF',
                        darkSurface: '#0F172A'
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; overflow-x: hidden; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .modal-enter { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        ::selection { background-color: #2563EB; color: white; }
        #installBanner { display: none; }
        #installBanner.show { display: flex; }

        /* Glassmorphism & animation enhancements */
        .glass { background: rgba(255,255,255,0.15); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .glass-dark { background: rgba(15,23,42,0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .soft-shadow { box-shadow: 0 4px 24px rgba(37,99,235,0.08), 0 1px 3px rgba(0,0,0,0.04); }
        .card-hover { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(37,99,235,0.12), 0 2px 8px rgba(0,0,0,0.06); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseGlow { 0%,100% { box-shadow: 0 0 0 0 rgba(37,99,235,0.3); } 50% { box-shadow: 0 0 0 12px rgba(37,99,235,0); } }
        .animate-fade-in { animation: fadeInUp 0.4s ease-out forwards; }
        .pulse-glow { animation: pulseGlow 2s infinite; }
    </style>
</head>
<body class="bg-gradient-to-br from-[#f0f4ff] to-[#e8eeff] dark:from-[#0f172a] dark:to-[#020617] text-gray-800 dark:text-gray-200 antialiased min-h-screen relative pb-28 transition-colors duration-500">
    <!-- خلفية زخرفية -->
    <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
        <div class="absolute -top-40 -right-40 w-96 h-96 bg-blue-200/20 dark:bg-blue-900/10 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-indigo-200/20 dark:bg-indigo-900/10 rounded-full blur-3xl"></div>
    </div>

    <!-- ================= صفحة تسجيل الدخول ================= -->
    <div id="loginPage" class="fixed inset-0 z-[100] flex items-center justify-center bg-white dark:bg-darkSurface transition-all duration-500">
        <div class="w-full max-w-sm mx-4">
            <div class="text-center mb-8 animate-fade-in">
                <div class="w-20 h-20 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-primary to-primaryLight flex items-center justify-center text-4xl shadow-lg shadow-primary/20">📒</div>
                <h1 class="text-2xl font-extrabold text-gray-900 dark:text-white mb-1">دفتر الإنجاز</h1>
                <p class="text-gray-500 dark:text-gray-400 text-sm">مفكرتك الذكية في مكان واحد</p>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-4 animate-fade-in" style="animation-delay:0.1s">
                <div>
                    <label class="block text-sm font-bold mb-1.5 text-gray-700 dark:text-gray-300">البريد الإلكتروني</label>
                    <div class="relative">
                        <i class="ph ph-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="email" id="loginEmail" required placeholder="example@email.com" dir="ltr" class="w-full bg-gray-50 dark:bg-gray-800 border-2 border-gray-200 dark:border-gray-700 text-gray-900 dark:text-white rounded-xl px-4 py-3 pl-10 focus:outline-none focus:border-primary transition-all duration-200">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-1.5 text-gray-700 dark:text-gray-300">كلمة المرور</label>
                    <div class="relative">
                        <i class="ph ph-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="password" id="loginPassword" required placeholder="••••••••" dir="ltr" class="w-full bg-gray-50 dark:bg-gray-800 border-2 border-gray-200 dark:border-gray-700 text-gray-900 dark:text-white rounded-xl px-4 py-3 pl-10 focus:outline-none focus:border-primary transition-all duration-200">
                        <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600"><i id="togglePassIcon" class="ph ph-eye"></i></button>
                    </div>
                </div>
                <p id="loginError" class="text-rose-500 text-sm font-bold text-center hidden"></p>
                <button type="submit" class="w-full bg-gradient-to-r from-primary to-primaryLight text-white font-extrabold py-3.5 rounded-xl border-0 hover:from-primaryDark hover:to-primary transition-all duration-300 text-lg flex items-center justify-center gap-2 shadow-lg shadow-primary/20 hover:shadow-xl hover:shadow-primary/30 active:scale-[0.98]">
                    <span id="loginBtnText">تسجيل الدخول</span>
                    <span id="loginSpinner" class="hidden"><i class="ph ph-spinner animate-spin text-xl"></i></span>
                </button>
            </form>
            <div class="mt-4 text-center text-sm text-gray-400 dark:text-gray-500">
                اضغط دخول للمتابعة إلى دفتر ملاحظاتك
            </div>
        </div>
    </div>

    <!-- ================= التطبيق الرئيسي (مخفي قبل تسجيل الدخول) ================= -->
    <div id="appMain" class="relative z-10 hidden">

    <!-- ================= شريط تثبيت التطبيق ================= -->
    <div id="installBanner" class="fixed top-0 left-0 right-0 z-50 bg-gradient-to-r from-primary to-primaryLight text-white px-4 py-3 flex items-center justify-between gap-3 shadow-lg" style="display:none;">
        <div class="flex items-center gap-2">
            <i class="ph ph-download-simple text-2xl"></i>
            <div>
                <p class="font-bold text-sm">تثبيت التطبيق</p>
                <p class="text-xs text-white/80">ثبّت دفتر الإنجاز للوصول السريع</p>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="dismissInstall()" class="text-white/70 hover:text-white text-sm px-3 py-1">لاحقاً</button>
            <button onclick="installApp()" class="bg-white text-primary font-bold px-4 py-1.5 rounded-lg text-sm border border-black hover:bg-gray-100 transition">تثبيت</button>
        </div>
    </div>

    <!-- ================= الشريط العلوي ================= -->
    <header class="bg-gradient-to-r from-[#1e3a5f] to-[#1a2744] dark:from-[#0f172a] dark:to-[#020617] border-b border-blue-400/20 px-4 py-3 sticky top-0 z-30 flex justify-between items-center transition-colors duration-300">
        <div class="flex items-center gap-2 min-w-0">
            <button onclick="openSidebar()" class="w-10 h-10 rounded-xl border border-white/20 bg-white/10 flex items-center justify-center text-white hover:bg-white/20 transition shrink-0">
                <i class="ph ph-list text-xl text-white"></i>
            </button>
            <h1 id="main-header-title" class="text-white font-extrabold text-lg truncate flex items-center gap-2 drop-shadow-sm">
                <i class="ph-fill ph-note-pencil text-[#60a5fa]"></i> <span>الملاحظات</span>
            </h1>
        </div>
        <div class="flex items-center gap-2 shrink-0">
            <div id="item-count-badge" class="bg-white/15 border border-white/20 text-white px-2.5 py-1 rounded-full text-xs font-bold">0</div>
            <button onclick="toggleTheme()" class="w-10 h-10 rounded-xl border border-white/20 bg-white/10 flex items-center justify-center text-white hover:bg-white/20 transition">
                <i id="themeIcon" class="ph ph-moon text-xl text-white"></i>
            </button>
            <div id="firebaseStatus" class="relative w-10 h-10 rounded-xl bg-white/10 border border-white/20 flex items-center justify-center text-white transition" title="حالة المزامنة" aria-label="حالة المزامنة">
                <i id="firebaseStatusIcon" class="ph ph-database text-xl text-white"></i>
                <span id="firebaseStatusDot" class="absolute top-1.5 right-1.5 w-3 h-3 rounded-full border border-black bg-amber-400 animate-pulse"></span>
            </div>
        </div>
    </header>

    <!-- ================= شريط التنقل ================= -->
    <nav class="bg-gradient-to-r from-[#1e3a5f] to-[#1a2744] dark:from-[#0f172a] dark:to-[#020617] border-b border-blue-400/20 px-2 py-2 flex gap-1 overflow-x-auto hide-scrollbar sticky top-[57px] z-20 transition-colors duration-300">
        <button onclick="switchCategory('notes')" data-cat="notes" class="nav-btn px-3 py-2 rounded-xl text-sm font-bold flex items-center gap-1.5 shrink-0 transition">
            <span class="icon-container w-8 h-8 rounded-lg flex items-center justify-center border border-white/20 bg-white/15 text-white"><i class="ph-fill ph-note-pencil text-[#60a5fa]"></i></span>
            <span class="text-white font-bold">ملاحظات</span>
        </button>
        <button onclick="switchCategory('tasks')" data-cat="tasks" class="nav-btn px-3 py-2 rounded-xl text-sm font-bold flex items-center gap-1.5 shrink-0 transition">
            <span class="icon-container w-8 h-8 rounded-lg flex items-center justify-center border border-transparent text-white/50"><i class="ph ph-check-square"></i></span>
            <span class="text-white/50">مهام</span>
        </button>
        <button onclick="switchCategory('links')" data-cat="links" class="nav-btn px-3 py-2 rounded-xl text-sm font-bold flex items-center gap-1.5 shrink-0 transition">
            <span class="icon-container w-8 h-8 rounded-lg flex items-center justify-center border border-transparent text-white/50"><i class="ph ph-link"></i></span>
            <span class="text-white/50">روابط</span>
        </button>
        <button onclick="switchCategory('work')" data-cat="work" class="nav-btn px-3 py-2 rounded-xl text-sm font-bold flex items-center gap-1.5 shrink-0 transition">
            <span class="icon-container w-8 h-8 rounded-lg flex items-center justify-center border border-transparent text-white/50"><i class="ph ph-briefcase"></i></span>
            <span class="text-white/50">عمل</span>
        </button>
    </nav>

    <!-- ================= منطقة المحتوى ================= -->
    <main class="px-4 py-4">
        <div class="flex items-center gap-2 mb-4">
            <select id="categoryFilter" onchange="renderData()" class="bg-white dark:bg-[#2a2a2a] border border-black dark:border-gray-700 text-gray-800 dark:text-white rounded-xl px-3 py-2 text-sm font-bold focus:outline-none focus:border-primary transition w-full">
                <option value="all">كل الفئات</option>
            </select>
        </div>
        <div id="content-area" class="flex flex-col gap-3">
            <div class="text-center text-gray-500 py-20"><p class="font-bold">لا يوجد عناصر هنا.</p></div>
        </div>
    </main>

    <!-- ================= الشريط السفلي ================= -->
    <nav class="bg-gradient-to-r from-[#1e3a5f] to-[#1a2744] dark:from-[#0f172a] dark:to-[#020617] border-t border-blue-400/20 h-[65px] z-40 flex justify-between px-6 items-center transition-colors duration-300 fixed bottom-0 left-0 w-full">
        <div class="flex gap-4 sm:gap-8 w-full justify-start">
            <button onclick="switchCategory('notes')" class="nav-btn flex flex-col items-center justify-center w-12 transition-transform active:scale-90" data-cat="notes">
                <div class="icon-container w-9 h-9 rounded-xl flex items-center justify-center transition-all border border-transparent text-white/50">
                    <i class="ph ph-note text-2xl"></i>
                </div>
                <span class="text-[10px] font-semibold mt-0.5 text-white/50">ملاحظات</span>
            </button>
            <button onclick="switchCategory('tasks')" class="nav-btn flex flex-col items-center justify-center w-12 transition-transform active:scale-90" data-cat="tasks">
                <div class="icon-container w-9 h-9 rounded-xl flex items-center justify-center transition-all border border-transparent text-white/50">
                    <i class="ph ph-check-square-offset text-2xl"></i>
                </div>
                <span class="text-[10px] font-semibold mt-0.5 text-white/50">مهام</span>
            </button>
        </div>
        
        <div class="w-20 shrink-0 relative"></div> 

        <div class="flex gap-4 sm:gap-8 w-full justify-end">
            <button onclick="switchCategory('links')" class="nav-btn flex flex-col items-center justify-center w-12 transition-transform active:scale-90" data-cat="links">
                <div class="icon-container w-9 h-9 rounded-xl flex items-center justify-center transition-all border border-transparent text-white/50">
                    <i class="ph ph-link text-2xl"></i>
                </div>
                <span class="text-[10px] font-semibold mt-0.5 text-white/50">روابط</span>
            </button>
            <button onclick="switchCategory('work')" class="nav-btn flex flex-col items-center justify-center w-12 transition-transform active:scale-90" data-cat="work">
                <div class="icon-container w-9 h-9 rounded-xl flex items-center justify-center transition-all border border-transparent text-white/50">
                    <i class="ph ph-gear text-2xl"></i>
                </div>
                <span class="text-[10px] font-semibold mt-0.5 text-white/50">عمل</span>
            </button>
        </div>
    </nav>

    <!-- الزر العائم المركزي (FAB) -->
    <button onclick="openModal()" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-14 h-14 bg-gradient-to-br from-[#3b82f6] to-[#2563eb] text-white rounded-full flex items-center justify-center border-2 border-white/30 z-50 hover:scale-110 active:scale-95 transition-all duration-300 shadow-xl shadow-blue-500/30 pulse-glow">
        <i class="ph ph-plus text-2xl font-bold"></i>
    </button>

    <!-- ================= القائمة الجانبية ================= -->
    <div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-40 hidden opacity-0 transition-opacity duration-300" onclick="closeSidebar()"></div>
    <div id="sidebarMenu" class="fixed top-0 right-0 h-full w-72 bg-white dark:bg-[#1a1a1a] z-50 shadow-2xl transform translate-x-full transition-transform duration-300 overflow-y-auto border-l border-black dark:border-gray-800">
        <div class="p-4 border-b border-black dark:border-gray-800 bg-primary dark:bg-primaryDark">
            <div class="flex items-center justify-between">
                <h2 class="text-white font-extrabold text-lg">دفتر الإنجاز</h2>
                <button onclick="closeSidebar()" class="w-8 h-8 rounded-lg border border-black bg-white/10 flex items-center justify-center text-white"><i class="ph ph-x"></i></button>
            </div>
            <p id="header-date-badge" class="text-white/70 text-sm mt-1"></p>
        </div>
        <div class="p-4 space-y-3">
            <div class="bg-blue-50 dark:bg-blue-900/20 rounded-xl p-3 text-center border border-blue-200 dark:border-blue-800">
                <p class="font-bold text-primary dark:text-accent text-sm" id="sidebarUserEmail"></p>
            </div>
            <button onclick="openCalendarModal(); closeSidebar();" class="w-full flex items-center gap-2 p-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-[#2a2a2a] hover:bg-blue-50 dark:hover:bg-blue-900/20 transition font-bold soft-shadow">
                <i class="ph ph-calendar text-primary text-xl"></i> التقويم
            </button>
            <button onclick="openSettingsModal(); closeSidebar();" class="w-full flex items-center gap-2 p-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-[#2a2a2a] hover:bg-blue-50 dark:hover:bg-blue-900/20 transition font-bold soft-shadow">
                <i class="ph ph-gear text-primary text-xl"></i> إدارة الفئات
            </button>
            <hr class="border-gray-200 dark:border-gray-700">
            <button onclick="handleLogout(); closeSidebar();" class="w-full flex items-center gap-2 p-3 rounded-xl border border-rose-200 dark:border-rose-800 bg-rose-50 dark:bg-rose-900/20 hover:bg-rose-100 dark:hover:bg-rose-900/40 transition font-bold text-rose-600 dark:text-rose-400">
                <i class="ph ph-sign-out text-xl"></i> تسجيل الخروج
            </button>
        </div>
    </div>

    <!-- ================= نافذة الإضافة/التعديل ================= -->
    <div id="addModal" class="fixed inset-0 bg-black/50 z-50 hidden items-end justify-center" onclick="if(event.target===this)closeModal()">
        <div class="bg-white dark:bg-[#1a1a1a] w-full max-w-lg rounded-t-3xl max-h-[85vh] overflow-y-auto border border-black dark:border-gray-800 modal-enter">
            <form id="addForm" onsubmit="saveItem(event)">
                <div class="p-4 border-b border-black dark:border-gray-800 flex justify-between items-center sticky top-0 bg-white dark:bg-[#1a1a1a] z-10 rounded-t-3xl">
                    <h3 id="modal-title" class="font-extrabold text-lg">إضافة ملاحظة</h3>
                    <button type="button" onclick="closeModal()" class="w-8 h-8 rounded-lg border border-black dark:border-gray-700 flex items-center justify-center"><i class="ph ph-x"></i></button>
                </div>
                <input type="hidden" id="itemId" value="">
                
                <div class="p-4 space-y-3">
                    <div>
                        <label class="block text-sm font-bold mb-1.5">الفئة</label>
                        <select id="itemCategory" class="w-full bg-gray-50 dark:bg-[#2a2a2a] border border-black dark:border-gray-700 text-gray-800 dark:text-white rounded-xl px-4 py-3 focus:outline-none focus:border-primary transition">
                            <option value="">بدون فئة</option>
                        </select>
                        <button type="button" onclick="addNewCategory()" class="mt-1 text-xs text-primary dark:text-accent font-bold hover:underline">+ إضافة فئة جديدة</button>
                    </div>

                    <!-- حقول أساسية -->
                    <div id="basicFields">
                        <div>
                            <label id="titleLabel" class="block text-sm font-bold mb-1.5">العنوان</label>
                            <input type="text" id="itemTitle" placeholder="عنوان الملاحظة..." class="w-full bg-gray-50 dark:bg-[#2a2a2a] border border-black dark:border-gray-700 text-gray-800 dark:text-white rounded-xl px-4 py-3 focus:outline-none focus:border-primary transition">
                        </div>
                        <div id="contentField">
                            <label class="block text-sm font-bold mb-1.5">المحتوى</label>
                            <textarea id="itemContent" rows="6" class="w-full bg-gray-50 dark:bg-[#2a2a2a] border border-black dark:border-gray-700 text-gray-800 dark:text-white rounded-xl px-4 py-3 focus:outline-none focus:border-primary resize-none transition leading-relaxed"></textarea>
                        </div>
                        <div id="urlField">
                            <label class="block text-sm font-bold mb-1.5">الرابط</label>
                            <input type="url" id="itemUrl" placeholder="https://..." class="w-full bg-gray-50 dark:bg-[#2a2a2a] border border-black dark:border-gray-700 text-gray-800 dark:text-white rounded-xl px-4 py-3 focus:outline-none focus:border-primary transition" dir="ltr">
                        </div>
                    </div>

                    <!-- حقول العمل -->
                    <div id="workFields" style="display:none;">
                        <div class="grid grid-cols-3 gap-2">
                            <div>
                                <label class="block text-sm font-bold mb-1.5">RM</label>
                                <select id="workRm" class="w-full bg-gray-50 dark:bg-[#2a2a2a] border border-black dark:border-gray-700 text-gray-800 dark:text-white rounded-xl px-3 py-3 focus:outline-none focus:border-primary transition">
                                    <option value="RM1">RM1</option><option value="RM2">RM2</option><option value="RM3">RM3</option><option value="RM4">RM4</option><option value="RM5">RM5</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-bold mb-1.5">ST</label>
                                <select id="workSt" class="w-full bg-gray-50 dark:bg-[#2a2a2a] border border-black dark:border-gray-700 text-gray-800 dark:text-white rounded-xl px-3 py-3 focus:outline-none focus:border-primary transition"></select>
                            </div>
                            <div>
                                <label class="block text-sm font-bold mb-1.5">RB/RD</label>
                                <select id="workRbRd" onchange="updateCustomInputLabel(this.value)" class="w-full bg-gray-50 dark:bg-[#2a2a2a] border border-black dark:border-gray-700 text-gray-800 dark:text-white rounded-xl px-3 py-3 focus:outline-none focus:border-primary transition">
                                    <option value="RB">RB</option><option value="RD">RD</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label id="customInputLabel" class="block text-sm font-bold mb-1.5">قيمة RB</label>
                            <input type="text" id="workCustomInput" placeholder="القيمة..." class="w-full bg-gray-50 dark:bg-[#2a2a2a] border border-black dark:border-gray-700 text-gray-800 dark:text-white rounded-xl px-4 py-3 focus:outline-none focus:border-primary transition">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-1.5">العملية</label>
                            <select id="workOperation" class="w-full bg-gray-50 dark:bg-[#2a2a2a] border border-black dark:border-gray-700 text-gray-800 dark:text-white rounded-xl px-4 py-3 focus:outline-none focus:border-primary transition">
                                <option value="Notching">Notching</option><option value="Blanking">Blanking</option><option value="Bending">Bending</option><option value="Welding">Welding</option><option value="Assembly">Assembly</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-1.5">المرجع</label>

    <script>
        // ================= IndexedDB Helper =================
        const DB_NAME = 'daftarAlinjazDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'appData';

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME);
                    }
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }

        async function saveToIndexedDB(key, value) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                store.put(value, key);
                tx.oncomplete = () => { db.close(); resolve(); };
                tx.onerror = (e) => { db.close(); reject(e.target.error); };
            });
        }

        async function loadFromIndexedDB(key) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const request = store.get(key);
                request.onsuccess = () => { db.close(); resolve(request.result); };
                request.onerror = (e) => { db.close(); reject(e.target.error); };
            });
        }
    </script>

        }
        let appHasStarted = false;

        let lastSavedSection = null;

        // ================= Helpers =================
        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, function(tag) {
                const chars = { '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' };
                return chars[tag] || tag;
            });
        }

        function formatURL(url) {
            if (!url) return '';
            if (!url.startsWith('http://') && !url.startsWith('https://')) { return 'https://' + url; }
            return url;

        // ================= ST Options =================
        const stSelect = document.getElementById('workSt');

        // ================= State =================

            notes: ['عام', 'أفكار', 'شخصي'],

            links: ['أدوات', 'مراجع', 'أخرى'],
            work: ['عام', 'صيانة', 'إنتاج']
        };

        function getEmptyAppData() {
            return {
                notes: [],
                tasks: [],
                links: [],
                work: [],
                categories: JSON.parse(JSON.stringify(defaultCategories))
            };
        }

        let appData = getEmptyAppData();

        // ================= IndexedDB as Primary Storage (unlimited size!) =================
        async function saveLocalData() {
            try {
                await saveToIndexedDB('productivityData', appData);
                // Also save shiftStartDate to IndexedDB
                if (shiftStartDate) {
                    await saveToIndexedDB('shiftStartDate', shiftStartDate.toISOString());
                }
            } catch (error) {
                console.error('فشل الحفظ في IndexedDB:', error);
                // Fallback to localStorage for smaller data
                try {
                    localStorage.setItem('productivityData', JSON.stringify(appData));
                } catch (e) {
                    console.error('فشل الحفظ المحلي بالكامل:', e);
                    alert('⚠️ تعذر حفظ البيانات. قد يكون التخزين ممتلئاً. حاول حذف بعض العناصر القديمة.');
                }
            }
        }

        async function saveData(options = {}) {
            await saveLocalData();
            if (appHasStarted && !options.skipCloud) {
                scheduleCloudSave();
            }
        }

        async function loadLocalData() {
            try {
                const data = await loadFromIndexedDB('productivityData');
                if (data && typeof data === 'object') {
                    return data;
                }
            } catch (error) {
                console.error('فشل تحميل IndexedDB:', error);
            }
            // Fallback: try localStorage
            try {
                const raw = localStorage.getItem('productivityData');
                const parsed = raw ? JSON.parse(raw) : null;
                if (parsed && typeof parsed === 'object') return parsed;
            } catch (e) {}
            return getEmptyAppData();
        }

        // ================= Firebase Status =================
        function setFirebaseStatus(message, type = 'info') {
            const wrapper = document.getElementById('firebaseStatus');
            const icon = document.getElementById('firebaseStatusIcon');
            const dot = document.getElementById('firebaseStatusDot');
            if (!wrapper || !icon || !dot) return;
            wrapper.title = message;
            wrapper.setAttribute('aria-label', message);
            wrapper.className = 'relative w-10 h-10 rounded-xl bg-white/10 border border-black flex items-center justify-center text-white transition';
            icon.className = 'ph ph-database text-xl transition-colors duration-300';
            dot.className = 'absolute top-1.5 right-1.5 w-3 h-3 rounded-full border border-black transition-colors duration-300';
            if (type === 'success') {
                icon.classList.add('text-emerald-300');
                dot.classList.add('bg-emerald-400');
            } else if (type === 'error') {
                icon.classList.add('text-rose-300');
                dot.classList.add('bg-rose-500');
            } else {
                icon.classList.add('text-amber-300');
                dot.classList.add('bg-amber-400', 'animate-pulse');
            }
        }

        // ================= Load from Firebase (per-section docs) =================
        async function loadDataFromCloud() {
            setFirebaseStatus('جارٍ الاتصال بقاعدة البيانات...', 'info');
            try {
                let loadedAny = false;
                for (const section of sections) {
                    try {
                        const snap = await getDoc(cloudDocRefs[section]);
                        if (snap.exists()) {
                            const cloudData = snap.data();
                            if (cloudData && Array.isArray(cloudData.items)) {
                                appData[section] = cloudData.items;
                                loadedAny = true;
                            }
                        }
                    } catch (e) { console.error('Firebase load section error (' + section + '):', e); }
                }
                // Load categories
                try {
                    const catSnap = await getDoc(cloudDocRefs['categories']);
                    if (catSnap.exists() && catSnap.data().categories) {
                        appData.categories = catSnap.data().categories;
                    }
                } catch (e) { console.error('Firebase load categories error:', e); }

                ensureAppDataShape();
                await saveLocalData();

                if (loadedAny) {
                    setFirebaseStatus('متصل بقاعدة البيانات - تم تحميل البيانات من Firebase', 'success');
                } else {
                    // First time: push local data up
                    await syncAllSectionsToCloud();
                    setFirebaseStatus('متصل بقاعدة البيانات - تم إنشاء مستندات جديدة', 'success');
                }
                return true;
            } catch (error) {
                console.error('Firebase load error:', error);
                setFirebaseStatus('غير متصل - العمل محلياً فقط', 'error');
                return false;
            }
        }

        function estimateSectionSize(section) {
            try { return new Blob([JSON.stringify(appData[section])]).size; } catch(e) { return 0; }
        }

        function measureTotalDataSize() {
            let total = 0;
            for (const s of sections) { total += estimateSectionSize(s); }
            return total;
        }

        async function syncAllSectionsToCloud() {
            ensureAppDataShape();
            for (const section of sections) {
                try {
                    const sectionSize = estimateSectionSize(section);
                    if (sectionSize > 900000) {
                        console.warn('Section ' + section + ' is ' + (sectionSize/1024).toFixed(0) + ' KB — near Firestore limit, syncing anyway');
                    }
                    await setDoc(cloudDocRefs[section], {
                        items: appData[section],
                        updatedAt: serverTimestamp()
                    }, { merge: true });
                } catch (e) {
                    console.error('Firebase sync section error (' + section + '):', e);
                }
            }
            // Sync categories
            try {
                await setDoc(cloudDocRefs['categories'], {
                    categories: appData.categories,
                    updatedAt: serverTimestamp()
                }, { merge: true });
            } catch (e) { console.error('Firebase sync categories error:', e); }

            setFirebaseStatus('تم حفظ التغييرات في Firebase (' + (measureTotalDataSize()/1024).toFixed(0) + ' KB)', 'success');
        }

        async function syncDataToCloud() {
            if (!appHasStarted) return;
            try {
                setFirebaseStatus('جارٍ حفظ التغييرات في Firebase...', 'info');
                await syncAllSectionsToCloud();
            } catch (error) {
                console.error('Firebase save error:', error);
                setFirebaseStatus('فشل الحفظ في Firebase - تم الحفظ محلياً فقط', 'error');
            }
        }

        function scheduleCloudSave() {
            clearTimeout(cloudSaveTimer);
            cloudSaveTimer = setTimeout(syncDataToCloud, 700);
        }

        function ensureAppDataShape() {
            if (!appData || typeof appData !== 'object') { appData = getEmptyAppData(); }
            if (Array.isArray(appData.projects) && !Array.isArray(appData.work)) { appData.work = appData.projects; }
            delete appData.projects;
            sections.forEach(section => {
                if (!Array.isArray(appData[section])) { appData[section] = []; }
            });
            if (!appData.categories || typeof appData.categories !== 'object') { appData.categories = JSON.parse(JSON.stringify(defaultCategories)); }
            sections.forEach(section => {
                if (!Array.isArray(appData.categories[section])) { appData.categories[section] = [...defaultCategories[section]]; }
            });
        }

        // ================= Categories =================
        function getSectionCategories(section) {
            if (!appData.categories) appData.categories = {};
            if (!Array.isArray(appData.categories[section])) { appData.categories[section] = []; }
            return appData.categories[section];
        }

        function createOption(value, text) {
            const option = document.createElement('option');

        function populateCategoryFilters() {

        function addCategoryToSection(section, name) {
            const safeName = String(name || '').trim();
            if (!safeName) { return { ok: false, message: 'اكتب اسم الفئة أولاً.' }; }
            const categories = getSectionCategories(section);
            const exists = categories.some(cat => cat.toLowerCase() === safeName.toLowerCase());
            if (exists) { return { ok: false, message: 'هذه الفئة موجودة مسبقاً.' }; }
            categories.push(safeName);
            saveData();
            return { ok: true, message: 'تمت إضافة الفئة بنجاح.', name: safeName };
        }

            if (!safeName) { showSettingsMessage('اسم الفئة لا يمكن أن يكون فارغاً.', 'error'); return; }
            if (safeName.toLowerCase() === oldName.toLowerCase()) return;
            const categories = getSectionCategories(section);
            const exists = categories.some(cat => cat.toLowerCase() === safeName.toLowerCase());
            if (exists) { showSettingsMessage('توجد فئة بهذا الاسم مسبقاً.', 'error'); return; }
            appData.categories[section] = categories.map(cat => cat === oldName ? safeName : cat);

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid'); grid.innerHTML = '';
            const monthsAr = ["جانفي", "فيفري", "مارس", "أفريل", "ماي", "جوان", "جويلية", "أوت", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];
            document.getElementById('cal-month-year').innerText = `${monthsAr[navMonth]} ${navYear}`;
            const firstDay = new Date(navYear, navMonth, 1).getDay(); const daysInMonth = new Date(navYear, navMonth + 1, 0).getDate();
            const isDark = document.documentElement.classList.contains('dark');
            for(let i=0; i<firstDay; i++) grid.innerHTML += `<div></div>`;
            for(let i=1; i<=daysInMonth; i++) {
                let cellDate = new Date(navYear, navMonth, i); cellDate.setHours(0,0,0,0);
                let bgColor = isDark ? 'bg-[#2a2a2a]' : 'bg-white'; let textColor = isDark ? 'text-gray-300' : 'text-gray-800';
                let customClass = 'rounded-xl border border-black dark:border-gray-700';
                if (shiftStartDate) {
                    let start = new Date(shiftStartDate); start.setHours(0,0,0,0);
                    let diffDays = Math.floor((cellDate.getTime() - start.getTime()) / (1000 * 60 * 60 * 24));
                    let cycle = ((Math.floor(diffDays / 2) % 2) + 2) % 2;
                    if (cycle === 0) { bgColor = 'bg-primary'; textColor = 'text-white font-bold'; }
                    else { bgColor = isDark ? 'bg-rose-900/40' : 'bg-rose-200'; textColor = isDark ? 'text-rose-300' : 'text-rose-800'; }

                let isToday = (cellDate.getTime() === new Date().setHours(0,0,0,0));
                if(isToday && !shiftStartDate) customClass += ' border-primary text-primary dark:border-accent dark:text-accent font-bold bg-primary/10';
                grid.innerHTML += `<div onclick="setShiftStart(${navYear}, ${navMonth}, ${i})" class="aspect-square flex items-center justify-center cursor-pointer text-sm transition-transform active:scale-90 ${bgColor} ${textColor} ${customClass}">${i}</div>`;
            }

        function setLoginLoading(loading) {
            document.getElementById('loginBtnText').style.display = loading ? 'none' : 'inline';
            document.getElementById('loginSpinner').classList.toggle('hidden', !loading);
            document.getElementById('loginForm').querySelector('button[type="submit"]').disabled = loading;
        }
        function togglePassword() {
            const pw = document.getElementById('loginPassword');
            const icon = document.getElementById('togglePassIcon');
            if (pw.type === 'password') { pw.type = 'text'; icon.className = 'ph ph-eye-slash'; }
            else { pw.type = 'password'; icon.className = 'ph ph-eye'; }
        }

        async function handleLogin(e) {
            e.preventDefault();
            hideLoginError();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!email || !password) { showLoginError('يرجى إدخال البريد الإلكتروني وكلمة المرور'); return; }
            setLoginLoading(true);
            try {
                await signInWithEmailAndPassword(auth, email, password);
                // onAuthStateChanged will handle the rest
            } catch (error) {
                console.error('Login error:', error);
                if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
                    showLoginError('البريد الإلكتروني أو كلمة المرور غير صحيحة');
                } else if (error.code === 'auth/invalid-email') {
                    showLoginError('صيغة البريد الإلكتروني غير صحيحة');
                } else if (error.code === 'auth/too-many-requests') {
                    showLoginError('محاولات كثيرة جداً. حاول لاحقاً.');
                } else {
                    showLoginError('حدث خطأ. حاول مرة أخرى.');
                }
                setLoginLoading(false);
            }
        }

        async function handleLogout() {
            try {
                await signOut(auth);
                // onAuthStateChanged will show login page
            } catch (e) {
                console.error('Logout error:', e);
            }
        }

        async function migrateOldData() {
            // هل توجد بيانات قديمة في localStorage لم تُهاجر بعد؟
            const rawOld = localStorage.getItem('productivityData');
            if (!rawOld) return; // لا توجد بيانات قديمة

            const migratedKey = 'dataMigratedToIDB';
            const alreadyMigrated = localStorage.getItem(migratedKey);
            if (alreadyMigrated === 'v2') return; // تمت الهجرة مسبقاً

            // هل IndexedDB فارغ أو جديد؟
            let idbData = null;
            try {
                idbData = await loadFromIndexedDB('productivityData');
            } catch (e) {}

            // إذا IndexedDB فارغ أو بياناته أقل، انقل من localStorage
            const idbHasData = idbData && typeof idbData === 'object' &&
                (Array.isArray(idbData.notes) && idbData.notes.length > 0) ||
                (Array.isArray(idbData.tasks) && idbData.tasks.length > 0) ||
                (Array.isArray(idbData.links) && idbData.links.length > 0) ||
                (Array.isArray(idbData.work) && idbData.work.length > 0);

            if (!idbHasData) {
                try {
                    const oldData = JSON.parse(rawOld);
                    if (oldData && typeof oldData === 'object') {
                        await saveToIndexedDB('productivityData', oldData);
                        console.log('✅ تم ترحيل البيانات القديمة من localStorage إلى IndexedDB بنجاح');
                    }
                } catch (e) {
                    console.error('⚠️ فشل ترحيل البيانات القديمة:', e);
                }
            }

            localStorage.setItem(migratedKey, 'v2');
        }

        // ================= PWA - Service Worker =================
        function registerServiceWorker() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            }
        }

        // ================= PWA - Install Prompt =================
        let deferredPrompt;

        function setupInstallPrompt() {
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                showInstallBanner();
            });
            window.addEventListener('appinstalled', () => {
                hideInstallBanner();
                deferredPrompt = null;
            });
            // Show banner if app is not already installed and not recently dismissed
            if (!isAppInstalled() && !wasRecentlyDismissed()) {
                setTimeout(attemptShowBanner, 3000);
            }
        }

        function attemptShowBanner() {
            if (deferredPrompt) {
                showInstallBanner();
            }
        }

        function showInstallBanner() {
            document.getElementById('installBanner').classList.add('show');
            document.getElementById('installBanner').style.display = 'flex';
        }

        function hideInstallBanner() {
            document.getElementById('installBanner').classList.remove('show');
            document.getElementById('installBanner').style.display = 'none';
        }

        function dismissInstall() {
            hideInstallBanner();
            localStorage.setItem('installDismissedAt', Date.now().toString());
        }

        function isAppInstalled() {
            return window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;
        }

        function wasRecentlyDismissed() {
            const dismissedAt = localStorage.getItem('installDismissedAt');
            if (!dismissedAt) return false;
            return (Date.now() - parseInt(dismissedAt)) < 7 * 24 * 60 * 60 * 1000; // 7 days
        }

        async function installApp() {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            hideInstallBanner();
            deferredPrompt = null;
            if (outcome === 'accepted') {
                localStorage.removeItem('installDismissedAt');
            }
        }

        // ================= Expose to window =================
        Object.assign(window, {
            updateCustomInputLabel, toggleTheme, renderData, switchCategory,
            openSidebar, closeSidebar, openModal, closeModal, saveItem,
            editItem, deleteItem, toggleTask, openViewModal, closeViewModal,
            saveViewContent, copyViewContent, addNewCategory,
            openSettingsModal, closeSettingsModal, renderCategorySettings,
            addCategoryFromSettings, openCalendarModal, closeCalendarModal,
            changeMonth, setShiftStart, installApp, dismissInstall,
            handleLogin, handleLogout, togglePassword
        });

        initApp();
    </script>
</body>
</html>
